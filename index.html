<!DOCTYPE html>
<html>
<head>
    <title>Leaflet 6 Tutorial Pemula</title>

    <!-- ===================== -->
    <!-- TUTORIAL 1: SETUP -->
    <!-- Import CSS & JS Leaflet -->
    <!-- ===================== -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Wajib: ukuran peta */
        #map {
            height: 600px;
        }
    </style>
</head>
<body>

<h2> 6 Tutorial Leaflet</h2>

<!-- Tempat peta ditampilkan -->
<div id="map"></div>

<script>

    
    // TUTORIAL 2: MENAMPILKAN PETA
    
    // Membuat peta dan menentukan titik tengah + zoom
    var map = L.map('map').setView([-3.218394734501295, 104.6487569002039], 10);

    // Menambahkan basemap OpenStreetMap
    var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);


    
    // TUTORIAL 3: MARKER & POPUP
   
    // Menambahkan marker (titik lokasi)
    var marker = L.marker([-3.218394734501295, 104.6487569002039]).addTo(map);

    // Menambahkan popup pada marker
    marker.bindPopup("<b>Lokasi Saya</b><br>Ini contoh marker").openPopup();


    
    // TUTORIAL 4: POLYLINE & POLYGON
    // ================================
    // Polyline (garis)
    var garis = L.polyline([
        [-3.218394734501295, 104.6487569002039],
        [-3.218394734501295, 104.6487569002039],
        [-3.218394734501295, 104.6487569002039]
    ], {
        color: 'blue'
    }).addTo(map);

    garis.bindPopup("Ini contoh garis (Polyline)");

    // Polygon (area)
    var area = L.polygon([
        [-3.218394734501295, 104.6487569002039],
        [-3.218394734501295, 104.6487569002039],
        [-3.218394734501295, 104.6487569002039]
    ], {
        color: 'green'
    }).addTo(map);

    area.bindPopup("Ini contoh area (Polygon)");


    
    // TUTORIAL 5: GEOJSON
    
    // Contoh data GeoJSON sederhana
    var geojsonData = {
        "type": "Feature",
        "properties": { "name": "Area GeoJSON" },
        "geometry": {
            "type": "Polygon",
            "coordinates": [[
                [105.20, -5.50],
                [105.30, -5.48],
                [105.35, -5.55],
                [105.20, -5.50]
            ]]
        }
    };

    // Menambahkan GeoJSON ke peta
    var geojsonLayer = L.geoJSON(geojsonData, {
        style: {
            color: "red"
        }
    }).addTo(map);

    geojsonLayer.bindPopup("Ini data GeoJSON");


    
    // TUTORIAL 6: INTERAKTIF
    

    // Layer tambahan (simulasi layer lain)
    var satelit = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png');

    // Layer control (pilih basemap)
    var baseMaps = {
        "OpenStreetMap": osm,
        "Satelit": satelit
    };

    L.control.layers(baseMaps).addTo(map);

    // Event klik pada peta
    map.on('click', function(e) {
        L.popup()
            .setLatLng(e.latlng)
            .setContent("Koordinat: <br>" + e.latlng.lat.toFixed(5) + ", " + e.latlng.lng.toFixed(5))
            .openOn(map);
    });

</script>

</body>
</html>
